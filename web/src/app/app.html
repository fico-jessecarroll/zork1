<div class="game-layout">
  <app-terminal
    #terminal
    class="terminal-pane"
    [gameState]="gameState"
    [roomName]="roomName"
    (command)="onCommand($event)"
  ></app-terminal>
  <div class="sidebar">
    <app-cheat-sheet></app-cheat-sheet>
    <app-hints [roomId]="roomId"></app-hints>
  </div>
</div>
