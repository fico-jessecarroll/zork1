<div class="game-layout">
  <app-terminal
    #terminal
    class="terminal-pane"
    [gameState]="gameState"
    [roomName]="roomName"
    (command)="onCommand($event)"
  ></app-terminal>
  <div class="sidebar">
    <app-cheat-sheet></app-cheat-sheet>
    <app-inventory [items]="inventory"></app-inventory>
    <app-save-slots [slots]="saveSlots" (restoreSlot)="onRestoreSlot($event)"></app-save-slots>
    <app-hints [roomId]="roomId"></app-hints>
    <button class="mute-btn" (click)="toggleMute()" [attr.aria-label]="isMuted ? 'Unmute' : 'Mute'">
      {{ isMuted ? '🔇' : '🔊' }}
    </button>
  </div>
</div>
