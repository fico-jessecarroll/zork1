<div class="inv-container">
  <button class="inv-toggle" (click)="toggle()">
    {{ isOpen ? '▲' : '▼' }} Inventory
  </button>
  <div class="inv-body" *ngIf="isOpen">
    <div *ngIf="items.length === 0" class="inv-empty">Empty-handed</div>
    <div *ngFor="let item of items" class="inv-item">{{ item }}</div>
  </div>
</div>
