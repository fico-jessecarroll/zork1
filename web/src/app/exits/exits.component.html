<div class="exits-container">
  <button class="exits-toggle" (click)="toggle()">
    {{ isOpen ? '▲' : '▼' }} Exits
  </button>
  <div class="exits-body" *ngIf="isOpen">
    <span *ngIf="exits.length === 0" class="exits-none">None</span>
    <span *ngFor="let dir of exits" class="exit-tag">{{ abbrev(dir) }}</span>
  </div>
</div>
