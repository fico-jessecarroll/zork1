<div class="terminal-wrapper" [ngClass]="'theme-' + theme">
  <div class="status-bar">
    <span class="room-name">{{ roomName }}</span>
    <span class="score-moves" *ngIf="gameState">
      Score: {{ gameState.score }}&nbsp;&nbsp;Moves: {{ gameState.moves }}
    </span>
    <button class="theme-btn" (click)="toggleTheme()" [attr.aria-label]="'Switch to ' + (theme === 'amber' ? 'green' : 'amber') + ' theme'">
      {{ theme === 'amber' ? '◉ GREEN' : '◉ AMBER' }}
    </button>
  </div>

  <div class="transcript" #scrollContainer>
    <div
      *ngFor="let line of transcript"
      [class]="'line line--' + line.type"
    >{{ line.text }}</div>
  </div>

  <div class="input-row">
    <span class="prompt">&gt;</span>
    <input
      #inputEl
      class="cmd-input"
      type="text"
      [(ngModel)]="inputValue"
      (keydown)="handleKeydown($event)"
      autocomplete="off"
      spellcheck="false"
      aria-label="Command input"
    />
  </div>
</div>
